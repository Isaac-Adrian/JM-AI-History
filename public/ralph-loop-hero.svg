<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Ralph Wiggum Loop Hero Placeholder</title>
  <desc id="desc">Abstract poster for the Ralph Wiggum loop timeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1d4ed8" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1275" cy="180" r="140" fill="#fde68a" fill-opacity="0.3" />
  <circle cx="260" cy="720" r="220" fill="#bfdbfe" fill-opacity="0.18" />
  <rect x="120" y="120" width="1360" height="660" rx="40" fill="#020617" fill-opacity="0.42" stroke="#f8fafc" stroke-opacity="0.2" />
  <text x="180" y="290" fill="#f8fafc" font-family="Georgia, serif" font-size="64" font-weight="700">The Ralph Wiggum Loop</text>
  <text x="180" y="380" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34">Prompt. Generate. Run. Fail. Re-prompt.</text>
  <text x="180" y="445" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="34">A short history of AI-assisted coding becoming a meme and a method.</text>
  <text x="180" y="610" fill="#fde68a" font-family="Courier New, monospace" font-size="30">2021 -> 2026</text>
